# Unified indicator contract for Government AI Agent Platform
# Root keys are indicator/technical-column codes.
# Runtime services should not read this YAML directly; generated artifacts will be created in the next phase.
#
# NOTE:
# imputation_policy is the desired contract behavior.
# Current pipeline must be aligned in the next pipeline/audit phase so poverty_headcount,
# poverty_change_5yr and crisis flags are not interpolated.

rGDP_growth_YoY:
  public: true
  technical: false
  dimension: false
  source_indicator: rgdp_growth_yoy
  source_priority: [gmd, wdi, macro]
  gold_table: gold_growth_dynamics
  gold_column: rGDP_growth_YoY
  additional_gold_locations:
    - gold_table: gold_crisis_risk
      gold_column: rGDP_growth_YoY
      role: support_feature
  unit: "%"
  value_type: numeric
  supports_raw: true
  supports_compare: true
  supports_ranking: true
  supports_coverage: true
  supports_trend: true
  supports_anomaly: true
  used_for_cluster: false
  imputation_policy: no_interpolate
  null_policy: preserve_null
  aliases_vi: [tăng trưởng GDP thực, tăng trưởng GDP thực hằng năm]
  aliases_en: [real GDP growth, real GDP growth YoY]

